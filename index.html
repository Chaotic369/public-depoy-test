 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Snake</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background-color: #1a1a24;
    color: #e6edf3;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
  }

  h1 {
    margin-bottom: 5px;
    letter-spacing: 2px;
    color: #39d353;
  }

  #score-board {
    font-size: 20px;
    margin-bottom: 20px;
    color: #8b949e;
  }

  canvas {
    background-color: #050914;
    border: 2px solid #484f58;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
  }

  p {
    margin-top: 15px;
    font-size: 14px;
    color: #8b949e;
  }
</style>
</head>
<body>

  <h1>SNAKE</h1>
  <div id="score-board">Score: <span id="score">0</span></div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p>Use Arrow Keys to move. Spacebar to restart.</p>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameLoop;
    let changingDirection = false;

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      score = 0;
      scoreElement.innerText = score;
      placeFood();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 100);
    }

    function placeFood() {
      food.x = Math.floor(Math.random() * tileCount);
      food.y = Math.floor(Math.random() * tileCount);
      
      // Ensure food doesn't spawn on the snake
      for (let part of snake) {
        if (part.x === food.x && part.y === food.y) {
          placeFood();
          break;
        }
      }
    }

    function update() {
      changingDirection = false;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Check wall collision
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        return gameOver();
      }

      // Check self collision
      for (let i = 0; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          return gameOver();
        }
      }

      snake.unshift(head); // Add new head

      // Check if food eaten
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.innerText = score;
        placeFood();
      } else {
        snake.pop(); // Remove tail if no food eaten
      }

      draw();
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = "#050914";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = "#f85149";
      ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

      // Draw snake
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#39d353" : "#2ea043"; // Head is brighter
        ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
      });
    }

    function gameOver() {
      clearInterval(gameLoop);
      ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = "#e6edf3";
      ctx.font = "bold 30px 'JetBrains Mono', monospace";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
      
      ctx.fillStyle = "#8b949e";
      ctx.font = "16px 'JetBrains Mono', monospace";
      ctx.fillText("Press Space to restart", canvas.width / 2, canvas.height / 2 + 25);
    }

    window.addEventListener("keydown", e => {
      // Prevent scrolling when using arrow keys or space
      if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
          e.preventDefault();
      }

      if (e.code === "Space") {
        resetGame();
        return;
      }

      if (changingDirection) return;

      if (e.key === "ArrowUp" && dy === 0) {
        dx = 0; dy = -1; changingDirection = true;
      } else if (e.key === "ArrowDown" && dy === 0) {
        dx = 0; dy = 1; changingDirection = true;
      } else if (e.key === "ArrowLeft" && dx === 0) {
        dx = -1; dy = 0; changingDirection = true;
      } else if (e.key === "ArrowRight" && dx === 0) {
        dx = 1; dy = 0; changingDirection = true;
      }
    });

    // Start the game initially
    resetGame();
  </script>
</body>
</html>
