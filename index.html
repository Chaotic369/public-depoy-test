<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>Offline Chess</title>
    <style>
        :root {
            --light-sq: #00ff00; /* Defaulting to the green from your screenshot */
            --dark-sq: #000033; /* Defaulting to the dark blue from your screenshot */
            --highlight: rgba(46, 204, 113, 0.6);
            --selected: rgba(241, 196, 15, 0.6);
        }

        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Settings Bar */
        #settings {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        .color-picker {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        /* Captured Pieces Zones */
        .captured-zone {
            width: 100%;
            max-width: 480px;
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            padding: 5px;
            box-sizing: border-box;
        }
        
        .captured-zone img {
            width: 30px;
            height: 30px;
            transition: transform 0.4s ease;
        }

        #top-captured { justify-content: flex-start; }
        #bottom-captured { justify-content: flex-end; }

        /* The Board */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr); /* FIX: Forces rows to be perfectly square */
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1 / 1;
            border: 2px solid #333;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .light { background-color: var(--light-sq); }
        .dark { background-color: var(--dark-sq); }

        /* Pieces and Rotation */
        .piece {
            width: 85%;
            height: 85%;
            object-fit: contain; /* FIX: Prevents pieces from stretching off-center */
            transition: transform 0.5s ease;
            transform-origin: center center;
            pointer-events: none;
        }

        .rotate-piece { transform: rotate(180deg); }

        .black-piece { filter: grayscale(1) brightness(2.5); }

        /* Highlight Indicators */
        .selected { background-color: var(--selected) !important; }
        
        .possible-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background-color: var(--highlight);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="settings">
        <div class="color-picker">
            <label>Light</label>
            <input type="color" id="lightColor" value="#00ff00">
        </div>
        <div class="color-picker">
            <label>Dark</label>
            <input type="color" id="darkColor" value="#000033">
        </div>
    </div>

    <div id="top-captured" class="captured-zone"></div>

    <div id="board"></div>

    <div id="bottom-captured" class="captured-zone"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const topCaptured = document.getElementById('top-captured');
        const bottomCaptured = document.getElementById('bottom-captured');
        
        let selectedSquare = null;
        let possibleMoves = [];

        const standardCounts = { p: 8, n: 2, b: 2, r: 2, q: 1 };

        document.getElementById('lightColor').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--light-sq', e.target.value);
        });
        document.getElementById('darkColor').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--dark-sq', e.target.value);
        });

        function renderBoard() {
            boardEl.innerHTML = '';
            const boardData = game.board();
            let currentPieces = { w: { p:0, n:0, b:0, r:0, q:0 }, b: { p:0, n:0, b:0, r:0, q:0 } };
            
            const isBlackTurn = game.turn() === 'b';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const squareData = boardData[r][c];
                    const sqId = String.fromCharCode(97 + c) + (8 - r);
                    
                    const sqEl = document.createElement('div');
                    sqEl.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    sqEl.id = sqId;
                    
                    if (selectedSquare === sqId) sqEl.classList.add('selected');
                    if (possibleMoves.some(m => m.to === sqId)) sqEl.classList.add('possible-move');

                    if (squareData) {
                        currentPieces[squareData.color][squareData.type]++;
                        
                        const img = document.createElement('img');
                        img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/${squareData.color}${squareData.type.toUpperCase()}.png`;
                        
                        // Rotates all pieces to face the player whose turn it is
                        img.className = `piece ${isBlackTurn ? 'rotate-piece' : ''} ${squareData.color === 'b' ? 'black-piece' : ''}`;
                        sqEl.appendChild(img);
                    }
                    
                    sqEl.addEventListener('click', () => handleSquareClick(sqId));
                    boardEl.appendChild(sqEl);
                }
            }

            renderCapturedPieces(currentPieces, isBlackTurn);
        }

        function handleSquareClick(sqId) {
            const pieceOnSquare = game.get(sqId);

            if (selectedSquare) {
                const moveAttempt = game.move({
                    from: selectedSquare,
                    to: sqId,
                    promotion: 'q'
                });

                if (moveAttempt) {
                    selectedSquare = null;
                    possibleMoves = [];
                    renderBoard();
                    return;
                }
            }

            if (pieceOnSquare && pieceOnSquare.color === game.turn()) {
                selectedSquare = sqId;
                possibleMoves = game.moves({ square: sqId, verbose: true });
            } else {
                selectedSquare = null;
                possibleMoves = [];
            }
            
            renderBoard();
        }

        function renderCapturedPieces(currentPieces, isBlackTurn) {
            topCaptured.innerHTML = '';
            bottomCaptured.innerHTML = '';

            ['p', 'n', 'b', 'r', 'q'].forEach(type => {
                const capturedBlack = standardCounts[type] - currentPieces.b[type];
                for (let i = 0; i < capturedBlack; i++) {
                    let img = document.createElement('img');
                    img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/b${type.toUpperCase()}.png`;
                    img.className = 'black-piece';
                    bottomCaptured.appendChild(img);
                }

                const capturedWhite = standardCounts[type] - currentPieces.w[type];
                for (let i = 0; i < capturedWhite; i++) {
                    let img = document.createElement('img');
                    img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/w${type.toUpperCase()}.png`;
                    topCaptured.appendChild(img);
                }
            });

            topCaptured.className = `captured-zone ${isBlackTurn ? 'rotate-piece' : ''}`;
            bottomCaptured.className = `captured-zone ${isBlackTurn ? 'rotate-piece' : ''}`;
        }

        renderBoard();
    </script>
</body>
</html>
